<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Manager</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>Invoice Manager</h1>
    <p>請求書・領収書管理</p>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item" data-page="invoices" onclick="showPage('invoices')">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg></span> 請求書管理
    </button>
    <button class="nav-item" data-page="masters" onclick="showPage('masters')">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg></span> 会社マスタ
    </button>
  </nav>

  <div class="sidebar-tenant">
    <div>テナント</div>
    <select id="tenant-select">
      <option value="demo">demo</option>
      <option value="default">default</option>
    </select>
  </div>
</aside>

<!-- ── Main ──────────────────────────────────────────────── -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <h2 id="page-title" style="display:flex;align-items:center;gap:8px;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg> 請求書管理</h2>
    <div class="actions" id="topbar-actions"></div>
  </header>

  <div class="content">

    <!-- ══════════════════════════════════════════════════════
         INVOICES PAGE
    ══════════════════════════════════════════════════════ -->
    <div id="page-invoices" class="page">

      <!-- Upload zone -->
      <div class="card" style="margin-bottom:20px;">
        <div id="upload-zone" class="upload-zone" style="margin:16px;">
          <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z"/></svg></div>
          <p>ここにファイルをドロップ、または<strong>クリックして選択</strong></p>
          <p style="margin-top:4px;font-size:12px;">PDF / JPG / PNG 対応</p>
          <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp" multiple style="display:none" />
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="label">総件数</div>
          <div class="value" id="invoices-count">—</div>
        </div>
      </div>

      <!-- Table card -->
      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg></span>
            <input type="text" placeholder="ファイル名・発行者で検索..." id="invoice-search"
              oninput="filterInvoices()" />
          </div>
          <select class="filter-select" id="invoice-status-filter" onchange="loadInvoices(this.value)">
            <option value="">すべてのステータス</option>
            <option value="processed">解析済</option>
            <option value="approved">承認済</option>
          </select>
          <div class="spacer"></div>
          <button class="btn btn-outline" onclick="downloadCSV()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg> CSV</button>
          <button class="btn btn-outline" onclick="loadInvoices()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg> 更新</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:36px;"><input type="checkbox" id="select-all-check" onchange="toggleSelectAll(this)"></th>
                <th>ファイル名</th>
                <th style="min-width:90px;">文書種別</th>
                <th style="min-width:90px;">ステータス</th>
                <th style="min-width:120px;">発行者</th>
                <th style="min-width:110px;">請求書番号</th>
                <th style="min-width:100px;">合計金額</th>
                <th style="min-width:90px;">登録日</th>
                <th style="min-width:70px;">ストレージ</th>
                <th style="min-width:160px;">操作</th>
              </tr>
            </thead>
            <tbody id="invoices-tbody">
              <tr class="empty-row"><td colspan="7">読み込み中...</td></tr>
            </tbody>
          </table>
          <div id="invoice-pagination" class="pagination"></div>
        </div>
      </div>
    </div><!-- /page-invoices -->


    <!-- ══════════════════════════════════════════════════════
         MASTERS PAGE
    ══════════════════════════════════════════════════════ -->
    <div id="page-masters" class="page">
      <div class="stats">
        <div class="stat-card">
          <div class="label">登録会社数</div>
          <div class="value" id="masters-count">—</div>
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg></span>
            <input type="text" placeholder="会社名・登録番号で検索..." id="master-search"
              oninput="filterMasters()" />
          </div>
          <div class="spacer"></div>
          <button class="btn btn-outline" onclick="downloadSampleCSV()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg> サンプルCSV</button>
          <label class="btn btn-outline" style="cursor:pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg> CSVインポート
            <input type="file" id="master-csv-input" accept=".csv" style="display:none" onchange="handleMasterCSVInput(this)">
          </label>
          <button class="btn btn-primary" onclick="openCreateMaster()">＋ 新規登録</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>会社名</th>
                <th>登録番号</th>
                <th>住所</th>
                <th>電話番号</th>
                <th>メール</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="masters-tbody">
              <tr class="empty-row"><td colspan="6">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div><!-- /page-masters -->



  </div><!-- /content -->
</div><!-- /main -->


<!-- ═══════════════════════════════════════════════════════════
     MODALS
═══════════════════════════════════════════════════════════ -->

<!-- Invoice detail -->
<div class="modal-overlay" id="invoice-detail-modal">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h3 id="detail-title">請求書詳細</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('invoice-detail-modal')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="process-btn" onclick="processCurrentInvoice()" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-15 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21m-9-1.5h10.5a2.25 2.25 0 0 0 2.25-2.25V6.75a2.25 2.25 0 0 0-2.25-2.25H6.75A2.25 2.25 0 0 0 4.5 6.75v10.5a2.25 2.25 0 0 0 2.25 2.25Zm.75-12h9v9h-9v-9Z"/></svg> AI解析
      </button>
      <button class="btn btn-outline" onclick="closeModal('invoice-detail-modal')">閉じる</button>
    </div>
  </div>
</div>

<!-- Invoice edit -->
<div class="modal-overlay" id="edit-invoice-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>請求書 編集</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('edit-invoice-modal')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-invoice-id" />
      <div class="form-group">
        <label>文書種別</label>
        <select id="ei-doc-type">
          <option value="">（未判定）</option>
          <option value="請求書">請求書</option>
          <option value="領収書">領収書</option>
        </select>
      </div>
      <div class="form-group">
        <label>ステータス</label>
        <select id="ei-status">
          <option value="processed">解析済</option>
          <option value="approved">承認済</option>
        </select>
      </div>
      <div class="form-group">
        <label>紐付け会社</label>
        <select id="ei-company"><option value="">（未設定）</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('edit-invoice-modal')">キャンセル</button>
      <button class="btn btn-primary" id="edit-invoice-save-btn" onclick="saveInvoiceEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Company master create/edit -->
<div class="modal-overlay" id="master-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="master-modal-title">会社マスタ 新規登録</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('master-modal')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <form id="master-form" onsubmit="return false;">
        <div class="form-group">
          <label>会社名 <span style="color:var(--danger)">*</span></label>
          <input type="text" id="m-name" placeholder="株式会社サンプル" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>適格請求書登録番号</label>
            <input type="text" id="m-reg-num" placeholder="T1234567890123" />
          </div>
          <div class="form-group">
            <label>電話番号</label>
            <input type="text" id="m-phone" placeholder="03-1234-5678" />
          </div>
        </div>
        <div class="form-group">
          <label>住所</label>
          <input type="text" id="m-address" placeholder="東京都千代田区..." />
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="m-email" placeholder="info@example.co.jp" />
        </div>
        <div class="form-group">
          <label>備考</label>
          <textarea id="m-notes" placeholder="メモ"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('master-modal')">キャンセル</button>
      <button class="btn btn-primary" id="master-save-btn" onclick="saveMaster()">保存</button>
    </div>
  </div>
</div>


<!-- Toast container -->
<div id="toast-container"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/invoices.js"></script>
<script src="/static/js/masters.js"></script>

<script src="/static/js/app.js"></script>

</body>
</html>
