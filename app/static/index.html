<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Manager</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>Invoice Manager</h1>
    <p>請求書・領収書管理</p>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item" data-page="invoices" onclick="showPage('invoices')">
      <span class="icon">📄</span> 請求書管理
    </button>
    <button class="nav-item" data-page="masters" onclick="showPage('masters')">
      <span class="icon">🏢</span> 会社マスタ
    </button>
    <button class="nav-item" data-page="approvals" onclick="showPage('approvals')">
      <span class="icon">✅</span> 承認管理
    </button>
  </nav>

  <div class="sidebar-tenant">
    <div>テナント</div>
    <select id="tenant-select">
      <option value="demo">demo</option>
      <option value="default">default</option>
    </select>
  </div>
</aside>

<!-- ── Main ──────────────────────────────────────────────── -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <h2 id="page-title">📄 請求書管理</h2>
    <div class="actions" id="topbar-actions"></div>
  </header>

  <div class="content">

    <!-- ══════════════════════════════════════════════════════
         INVOICES PAGE
    ══════════════════════════════════════════════════════ -->
    <div id="page-invoices" class="page">

      <!-- Upload zone -->
      <div class="card" style="margin-bottom:20px;">
        <div id="upload-zone" class="upload-zone" style="margin:16px;">
          <div class="icon">☁️</div>
          <p>ここにファイルをドロップ、または<strong>クリックして選択</strong></p>
          <p style="margin-top:4px;font-size:12px;">PDF / JPG / PNG 対応</p>
          <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp" multiple style="display:none" />
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="label">総件数</div>
          <div class="value" id="invoices-count">—</div>
        </div>
      </div>

      <!-- Table card -->
      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="ファイル名・発行者で検索..." id="invoice-search"
              oninput="filterInvoices()" />
          </div>
          <select class="filter-select" id="invoice-status-filter" onchange="loadInvoices(this.value)">
            <option value="">すべてのステータス</option>
            <option value="pending">未処理</option>
            <option value="processed">解析済</option>
            <option value="approved">承認済</option>
            <option value="rejected">却下</option>
          </select>
          <div class="spacer"></div>
          <button class="btn btn-outline" onclick="loadInvoices()">🔄 更新</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ファイル名</th>
                <th>ステータス</th>
                <th>発行者</th>
                <th>請求書番号</th>
                <th>合計金額</th>
                <th>登録日</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="invoices-tbody">
              <tr class="empty-row"><td colspan="7">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div><!-- /page-invoices -->


    <!-- ══════════════════════════════════════════════════════
         MASTERS PAGE
    ══════════════════════════════════════════════════════ -->
    <div id="page-masters" class="page">
      <div class="stats">
        <div class="stat-card">
          <div class="label">登録会社数</div>
          <div class="value" id="masters-count">—</div>
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="会社名・登録番号で検索..." id="master-search"
              oninput="filterMasters()" />
          </div>
          <div class="spacer"></div>
          <button class="btn btn-primary" onclick="openCreateMaster()">＋ 新規登録</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>会社名</th>
                <th>登録番号</th>
                <th>住所</th>
                <th>電話番号</th>
                <th>メール</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="masters-tbody">
              <tr class="empty-row"><td colspan="6">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div><!-- /page-masters -->


    <!-- ══════════════════════════════════════════════════════
         APPROVALS PAGE
    ══════════════════════════════════════════════════════ -->
    <div id="page-approvals" class="page">
      <div class="stats">
        <div class="stat-card">
          <div class="label">承認レコード数</div>
          <div class="value" id="approvals-count">—</div>
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <select class="filter-select" id="approval-status-filter" onchange="loadApprovals()">
            <option value="">すべてのステータス</option>
            <option value="pending">承認待ち</option>
            <option value="approved">承認済</option>
            <option value="rejected">却下</option>
          </select>
          <div class="spacer"></div>
          <button class="btn btn-outline" onclick="loadApprovals()">🔄 更新</button>
          <button class="btn btn-primary" onclick="openCreateApproval()">＋ 承認依頼作成</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>請求書ID</th>
                <th>承認者</th>
                <th>ステータス</th>
                <th>コメント</th>
                <th>作成日</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="approvals-tbody">
              <tr class="empty-row"><td colspan="6">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div><!-- /page-approvals -->

  </div><!-- /content -->
</div><!-- /main -->


<!-- ═══════════════════════════════════════════════════════════
     MODALS
═══════════════════════════════════════════════════════════ -->

<!-- Invoice detail -->
<div class="modal-overlay" id="invoice-detail-modal">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h3 id="detail-title">請求書詳細</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('invoice-detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="detail-approval-btn">✅ 承認依頼作成</button>
      <button class="btn btn-primary" id="process-btn" onclick="processCurrentInvoice()" style="display:none;">
        🤖 AI解析
      </button>
      <button class="btn btn-outline" onclick="closeModal('invoice-detail-modal')">閉じる</button>
    </div>
  </div>
</div>

<!-- Invoice edit -->
<div class="modal-overlay" id="edit-invoice-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>請求書 編集</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('edit-invoice-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-invoice-id" />
      <div class="form-group">
        <label>ステータス</label>
        <select id="ei-status">
          <option value="pending">未処理</option>
          <option value="processed">解析済</option>
          <option value="approved">承認済</option>
          <option value="rejected">却下</option>
        </select>
      </div>
      <div class="form-group">
        <label>紐付け会社</label>
        <select id="ei-company"><option value="">（未設定）</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('edit-invoice-modal')">キャンセル</button>
      <button class="btn btn-primary" id="edit-invoice-save-btn" onclick="saveInvoiceEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Company master create/edit -->
<div class="modal-overlay" id="master-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="master-modal-title">会社マスタ 新規登録</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('master-modal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="master-form" onsubmit="return false;">
        <div class="form-group">
          <label>会社名 <span style="color:var(--danger)">*</span></label>
          <input type="text" id="m-name" placeholder="株式会社サンプル" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>適格請求書登録番号</label>
            <input type="text" id="m-reg-num" placeholder="T1234567890123" />
          </div>
          <div class="form-group">
            <label>電話番号</label>
            <input type="text" id="m-phone" placeholder="03-1234-5678" />
          </div>
        </div>
        <div class="form-group">
          <label>住所</label>
          <input type="text" id="m-address" placeholder="東京都千代田区..." />
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" id="m-email" placeholder="info@example.co.jp" />
        </div>
        <div class="form-group">
          <label>備考</label>
          <textarea id="m-notes" placeholder="メモ"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('master-modal')">キャンセル</button>
      <button class="btn btn-primary" id="master-save-btn" onclick="saveMaster()">保存</button>
    </div>
  </div>
</div>

<!-- Approval create -->
<div class="modal-overlay" id="approval-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>承認依頼 作成</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('approval-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>請求書ID <span style="color:var(--danger)">*</span></label>
        <input type="text" id="a-invoice-id" placeholder="UUID" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>承認者ID <span style="color:var(--danger)">*</span></label>
          <input type="text" id="a-approver-id" placeholder="user@example.com" />
        </div>
        <div class="form-group">
          <label>承認者名</label>
          <input type="text" id="a-approver-name" placeholder="山田 太郎" />
        </div>
      </div>
      <div class="form-group">
        <label>コメント</label>
        <textarea id="a-comment" placeholder="承認依頼の詳細..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('approval-modal')">キャンセル</button>
      <button class="btn btn-primary" id="approval-save-btn" onclick="saveApproval()">作成</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/invoices.js"></script>
<script src="/static/js/masters.js"></script>
<script src="/static/js/approvals.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
